<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#009688">
  <meta name="description" content="Arcade maintenance log and tracking system">
  <link rel="manifest" href="/tech/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/tech/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/tech/icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/tech/icon-192.png">
  <!-- iOS PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TechReport">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Arcade Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/tech/mobile-arcade.css">
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      padding-top: max(0px, var(--sat));
      padding-bottom: var(--sab);
    }
    .nav-btn.active {
      background-color: #009688 !important;
      color: white !important;
    }
    .loading-spinner { animation: spin 1s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Location selector overlay */
    #locationOverlay {
      background: linear-gradient(135deg, #009688 0%, #00796b 100%);
    }
    .location-card {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .location-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .location-card:active {
      transform: scale(0.98);
    }

    /* Dropdown shared styles (location + resources) */
    .location-dropdown,
    .resources-dropdown {
      position: relative;
    }
    .location-dropdown-menu,
    .resources-dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.5rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border: 1px solid #e5e7eb;
      overflow: hidden;
      z-index: 100;
      min-width: 220px;
      display: none;
    }
    .location-dropdown-menu.open,
    .resources-dropdown-menu.open {
      display: block;
    }
    .location-dropdown-item,
    .resources-dropdown-item {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .location-dropdown-item:hover,
    .resources-dropdown-item:hover {
      background: #f3f4f6;
    }
    .location-dropdown-item.active {
      background: #e0f2f1;
      color: #009688;
      font-weight: 600;
    }
    .resources-dropdown-item:hover {
      background: #ede9fe;
    }
    .location-dropdown-item i,
    .resources-dropdown-item i {
      width: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Location Selection Overlay (shown on first visit) -->
  <div id="locationOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-50 hidden">
    <div class="text-center mb-8">
      <i class="fas fa-gamepad text-white text-5xl mb-4 block"></i>
      <h1 class="text-3xl font-bold text-white mb-2">Arcade Maintenance</h1>
      <p class="text-white/80 text-lg">Select your location to get started</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 px-4 max-w-3xl w-full" id="locationGrid">
      <!-- Location cards will be injected by JS -->
    </div>
  </div>

  <!-- Top Navigation Bar -->
  <header class="bg-white border-b border-gray-200 shadow-sm z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i class="fas fa-gamepad text-[#009688] text-2xl"></i>
          <h1 class="text-lg font-bold text-gray-800 hidden sm:block">Arcade Maintenance</h1>
        </div>
        <nav class="flex items-center gap-2">
          <button onclick="navigateTo('page1')" data-page="page1" class="nav-btn active px-3 py-1.5 bg-[#009688] text-white rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-home mr-1"></i> <span class="hidden sm:inline">Home</span>
          </button>
          <button onclick="navigateTo('dashboard')" data-page="dashboard" class="nav-btn px-3 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-chart-line mr-1"></i> <span class="hidden sm:inline">Dashboard</span>
          </button>
          <button onclick="navigateTo('page3')" data-page="page3" class="nav-btn px-3 py-1.5 bg-gray-200 text-gray-700 hover:bg-gray-300 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-cog mr-1"></i> <span class="hidden sm:inline">Customize</span>
          </button>

          <!-- Resources Dropdown -->
          <div class="resources-dropdown">
            <button onclick="toggleResourcesDropdown()" id="resourcesBtn" class="px-3 py-1.5 bg-purple-50 text-purple-600 border border-purple-300/50 rounded-lg text-sm font-medium transition-colors hover:bg-purple-100 flex items-center gap-1.5">
              <i class="fas fa-book-open"></i>
              <span class="hidden sm:inline">Resources</span>
              <i class="fas fa-chevron-down text-xs ml-0.5"></i>
            </button>
            <div id="resourcesDropdownMenu" class="resources-dropdown-menu">
              <div class="px-3 py-2 bg-gray-50 border-b border-gray-100">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Resources</span>
              </div>
              <div id="resourcesDropdownItems">
                <!-- Items injected by JS -->
              </div>
            </div>
          </div>

          <!-- Location Dropdown -->
          <div class="location-dropdown">
            <button onclick="toggleLocationDropdown()" id="locationBtn" class="px-3 py-1.5 bg-teal-50 text-[#009688] border border-[#009688]/30 rounded-lg text-sm font-medium transition-colors hover:bg-teal-100 flex items-center gap-1.5">
              <i class="fas fa-map-marker-alt"></i>
              <span id="locationBtnLabel" class="hidden sm:inline">Location</span>
              <i class="fas fa-chevron-down text-xs ml-0.5"></i>
            </button>
            <div id="locationDropdownMenu" class="location-dropdown-menu">
              <div class="px-3 py-2 bg-gray-50 border-b border-gray-100">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Switch Location</span>
              </div>
              <div id="locationDropdownItems">
                <!-- Items injected by JS -->
              </div>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content Container -->
  <div id="mainContainer" class="flex-1 relative overflow-hidden bg-gray-50">

    <!-- 1. Login UI (Hidden by default) -->
    <div id="loginOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-30 hidden">
      <i class="fas fa-lock text-4xl text-gray-400 mb-4"></i>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Technician Dashboard Secure Access</h2>
      <p class="text-gray-500 mb-6">Please authenticate with JumpCloud to view this tool.</p>
      <button onclick="openAuthPopup()" class="px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg shadow transition-colors">
        Log In via SSO
      </button>
    </div>

    <!-- 2. Loading UI (Visible on start and during page changes) -->
    <div id="loadingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-20">
      <i class="fas fa-circle-notch text-5xl text-[#009688] loading-spinner mb-4"></i>
      <h2 class="text-xl font-semibold text-gray-800 mb-2" id="loadingText">Verifying secure session...</h2>
    </div>

    <!-- 3. The Iframe -->
    <iframe id="appFrame" class="w-full h-full border-none hidden z-10 relative" allow="clipboard-write; clipboard-read"></iframe>
  </div>

<script>
    // ===========================================
    // LOCATION CONFIGURATION
    // Each location has a name, icon, color, and GAS URL.
    // Update the 'url' field with the actual GAS deployment URL for each location.
    // ===========================================
    const LOCATIONS = {
      'castaway': {
        name: 'Castaway',
        icon: 'fa-umbrella-beach',
        color: '#f59e0b',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbxgefN9jRebR4shNSJvqZTLsdLvUT3wzWp_4QFGsms9JkZexUg6s-Grb-hl9J9BvBEh/exec'
      },
      'cedar-point': {
        name: 'Cedar Point',
        icon: 'fa-flag',
        color: '#ef4444',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbyQDWMM334B_3emn40fWU-ljP_OoVfDCNlczyG-PPQJGLwEKXs_ZZkdyzZvwKPBi2r0/exec'
      },
      'kalahari': {
        name: 'Kalahari',
        icon: 'fa-water',
        color: '#3b82f6',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbxS0LAYkCEx3nHxG5V3i3K_0H3YCdSyGFqqNQWYOs_-Cwbx9Fcu2cYaVsBUBQX0Yi3f/exec'
      },
      'great-wolf': {
        name: 'Great Wolf',
        icon: 'fa-paw',
        color: '#8b5cf6',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbz7kRv3roEtcPBF0gGB0PX8a7p9ufSco9bJjoTGji3N0dtJe66wCUY3ekJP-jC0RdVH/exec'
      },
      'waldameer': {
        name: 'Waldameer',
        icon: 'fa-tree',
        color: '#10b981',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbzwfRkvN2i-Hp-SmR_aYgkPGG_98pEwLcQrk7nbV1cLcxzVtVfVnXqX7lzatCZhpKD_Zg/exec'
      }
    };

    // ===========================================
    // RESOURCES CONFIGURATION
    // These are global resources available to ALL locations.
    // They are NOT saved to localStorage — they open directly in the iframe.
    // ===========================================
    const RESOURCES = {
      'game-manuals': {
        name: 'Game Manuals',
        icon: 'fa-book',
        color: '#8b5cf6',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbyfJvCTLt7z3aTC9ssShVSJilit01BEamMmU9yt72PVxClEnSuZtEkS_koDKjU7OaPN/exec'
      },
      '3d-store': {
        name: '3D Store',
        icon: 'fa-cube',
        color: '#ec4899',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbwf0wuJZU4eMyVZMri5Jk1JFYRkov6fn07N6aYAKoaU50fa2EB9aEv_TnkjhGk_vQEx/exec'
      },
      'Seed-Live': {
        name: 'Seedlive',
        icon: 'fa-credit-card',
        color: '#FFCC00',
        url: 'https://script.google.com/a/macros/fegllc.com/s/AKfycbze5hLqoY3a_dwqgAyZcZhp3FFj8m-V0vb2Krcj0DXoxkunwJtIugZsilcUW1fgZ9L1qg/exec'
      }
    };

    const PATH_TO_PAGE = {
      '/': 'page1',
      '/index.html': 'page1',
      '/home': 'page1',
      '/dashboard': 'dashboard',
      '/customize': 'page3'
    };

    // --- DOM ELEMENTS ---
    const iframe = document.getElementById('appFrame');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const loginOverlay = document.getElementById('loginOverlay');
    const locationOverlay = document.getElementById('locationOverlay');

    // --- STATE ---
    let authTimeout;
    let isAuthenticated = false;
    let isLoadingResource = false; // true when loading a resource (not a location page)
    let currentLocation = null; // location key from LOCATIONS
    let GAS_URL = ''; // set dynamically based on location
    const urlParams = new URLSearchParams(window.location.search);
    let currentPage = urlParams.get('page') || PATH_TO_PAGE[window.location.pathname] || 'page1';

    // ===========================================
    // LOCATION MANAGEMENT
    // ===========================================

    function getSavedLocation() {
      try { return localStorage.getItem('selectedLocation'); } catch (e) { return null; }
    }

    function saveLocation(locationKey) {
      try { localStorage.setItem('selectedLocation', locationKey); } catch (e) {}
    }

    function selectLocation(locationKey) {
      const loc = LOCATIONS[locationKey];
      if (!loc) return;

      currentLocation = locationKey;
      GAS_URL = loc.url;
      saveLocation(locationKey);

      // Update header button label
      document.getElementById('locationBtnLabel').textContent = loc.name;

      // Update dropdown active state
      updateLocationDropdown();

      // Hide location overlay if visible
      locationOverlay.classList.add('hidden');

      // Close dropdown
      document.getElementById('locationDropdownMenu').classList.remove('open');

      // If already authenticated, reload the page in iframe
      if (isAuthenticated) {
        loadPage(currentPage);
      } else {
        // Start auth flow
        checkInitialAuth();
      }
    }

    function switchLocation(locationKey) {
      if (locationKey === currentLocation) {
        document.getElementById('locationDropdownMenu').classList.remove('open');
        return;
      }
      selectLocation(locationKey);
    }

    function buildLocationGrid() {
      const grid = document.getElementById('locationGrid');
      grid.innerHTML = '';

      Object.keys(LOCATIONS).forEach(key => {
        const loc = LOCATIONS[key];
        const card = document.createElement('div');
        card.className = 'location-card bg-white rounded-2xl p-6 text-center shadow-lg';
        card.onclick = function() { selectLocation(key); };
        card.innerHTML = `
          <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center" style="background: ${loc.color}20;">
            <i class="fas ${loc.icon} text-2xl" style="color: ${loc.color};"></i>
          </div>
          <h3 class="text-lg font-bold text-gray-800">${loc.name}</h3>
        `;
        grid.appendChild(card);
      });
    }

    function buildLocationDropdownItems() {
      const container = document.getElementById('locationDropdownItems');
      container.innerHTML = '';

      Object.keys(LOCATIONS).forEach(key => {
        const loc = LOCATIONS[key];
        const item = document.createElement('div');
        item.className = 'location-dropdown-item' + (key === currentLocation ? ' active' : '');
        item.dataset.location = key;
        item.onclick = function() { switchLocation(key); };
        item.innerHTML = `<i class="fas ${loc.icon}" style="color: ${loc.color};"></i> ${loc.name}`;
        container.appendChild(item);
      });
    }

    function updateLocationDropdown() {
      document.querySelectorAll('.location-dropdown-item').forEach(item => {
        if (item.dataset.location === currentLocation) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    function toggleLocationDropdown() {
      const menu = document.getElementById('locationDropdownMenu');
      menu.classList.toggle('open');
      // Close resources dropdown if open
      document.getElementById('resourcesDropdownMenu').classList.remove('open');
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
      const locDropdown = document.querySelector('.location-dropdown');
      if (locDropdown && !locDropdown.contains(e.target)) {
        document.getElementById('locationDropdownMenu').classList.remove('open');
      }
      const resDropdown = document.querySelector('.resources-dropdown');
      if (resDropdown && !resDropdown.contains(e.target)) {
        document.getElementById('resourcesDropdownMenu').classList.remove('open');
      }
    });

    // ===========================================
    // RESOURCES DROPDOWN LOGIC
    // ===========================================

    function toggleResourcesDropdown() {
      const menu = document.getElementById('resourcesDropdownMenu');
      menu.classList.toggle('open');
      // Close location dropdown if open
      document.getElementById('locationDropdownMenu').classList.remove('open');
    }

    function buildResourcesDropdownItems() {
      const container = document.getElementById('resourcesDropdownItems');
      container.innerHTML = '';

      Object.keys(RESOURCES).forEach(key => {
        const res = RESOURCES[key];
        const item = document.createElement('div');
        item.className = 'resources-dropdown-item';
        item.onclick = function() { openResource(key); };
        item.innerHTML = `<i class="fas ${res.icon}" style="color: ${res.color};"></i> ${res.name}`;
        container.appendChild(item);
      });
    }

    function openResource(resourceKey) {
      const res = RESOURCES[resourceKey];
      if (!res) return;

      // Close the dropdown
      document.getElementById('resourcesDropdownMenu').classList.remove('open');

      // Clear active nav state (resources are not a "page")
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

      // Flag so the iframe load handler knows this is a resource
      isLoadingResource = true;

      // Show loading
      loadingText.textContent = `Loading ${res.name}...`;
      loadingOverlay.classList.remove('hidden');
      iframe.classList.add('hidden');

      // Load the resource directly in the iframe (no auth gating — separate GAS app)
      iframe.src = res.url;
    }

    // ===========================================
    // AUTHENTICATION LOGIC
    // ===========================================

    function checkInitialAuth() {
      if (!GAS_URL) return;

      loadingText.textContent = 'Verifying secure session...';
      loadingOverlay.classList.remove('hidden');

      const pingFrame = document.createElement('iframe');
      pingFrame.style.display = 'none';
      pingFrame.src = `${GAS_URL}?page=authCheck`;
      document.body.appendChild(pingFrame);

      authTimeout = setTimeout(() => {
        loadingOverlay.classList.add('hidden');
        loginOverlay.classList.remove('hidden');
        pingFrame.remove();
      }, 3500);
    }

    // Listen for messages from iframe (auth + storage relay)
    window.addEventListener('message', function(event) {
      if (event.data === 'auth_success') {
        clearTimeout(authTimeout);
        proceedToApp();
        return;
      }

      // Storage relay
      const data = event.data;
      if (!data || typeof data !== 'object' || !data.type) return;

      if (data.type === 'storage-set') {
        try { localStorage.setItem(data.key, data.value); } catch (e) { console.error('Storage relay set error:', e); }
      } else if (data.type === 'storage-get') {
        try {
          const value = localStorage.getItem(data.key);
          if (event.source) {
            event.source.postMessage({ type: 'storage-result', key: data.key, value: value, requestId: data.requestId }, '*');
          }
        } catch (e) { console.error('Storage relay get error:', e); }
      } else if (data.type === 'storage-remove') {
        try { localStorage.removeItem(data.key); } catch (e) { console.error('Storage relay remove error:', e); }
      }
    });

    function openAuthPopup() {
      if (!GAS_URL) return;

      const popupWidth = 500;
      const popupHeight = 600;
      const left = (window.innerWidth / 2) - (popupWidth / 2);
      const top = (window.innerHeight / 2) - (popupHeight / 2);

      const authWindow = window.open(
        `${GAS_URL}?page=authCheck`,
        'SSOLogin',
        `width=${popupWidth},height=${popupHeight},top=${top},left=${left}`
      );

      const pollTimer = setInterval(() => {
        if (authWindow && authWindow.closed) {
          clearInterval(pollTimer);
          proceedToApp();
        }
      }, 500);
    }

    function proceedToApp() {
      isAuthenticated = true;
      loginOverlay.classList.add('hidden');
      loadPage(currentPage);
    }

    // ===========================================
    // NAVIGATION LOGIC
    // ===========================================

    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.page === currentPage) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    function loadPage(pageName) {
      if (!isAuthenticated || !GAS_URL) return;

      const locName = LOCATIONS[currentLocation] ? LOCATIONS[currentLocation].name : '';
      loadingText.textContent = `Loading ${locName}...`;
      loadingOverlay.classList.remove('hidden');
      iframe.classList.add('hidden');

      iframe.src = GAS_URL + '?page=' + pageName;
    }

    iframe.addEventListener('load', function() {
      if (isLoadingResource) {
        // Resource loaded — show iframe regardless of auth state
        isLoadingResource = false;
        loadingOverlay.classList.add('hidden');
        iframe.classList.remove('hidden');
      } else if (isAuthenticated && iframe.src.includes('page=')) {
        loadingOverlay.classList.add('hidden');
        iframe.classList.remove('hidden');
      }
    });

    function navigateTo(pageName) {
      currentPage = pageName;
      updateNav();

      const newUrl = window.location.pathname + '?page=' + pageName;
      window.history.pushState({ page: pageName }, '', newUrl);

      loadPage(pageName);
    }

    window.addEventListener('popstate', function(event) {
      const params = new URLSearchParams(window.location.search);
      currentPage = params.get('page') || 'page1';
      updateNav();
      loadPage(currentPage);
    });

    // ===========================================
    // INITIALIZATION
    // ===========================================
    document.addEventListener('DOMContentLoaded', function() {
      updateNav();
      buildLocationGrid();
      buildLocationDropdownItems();
      buildResourcesDropdownItems();

      // Check if user has a saved location
      const savedLoc = getSavedLocation();

      if (savedLoc && LOCATIONS[savedLoc]) {
        // Returning user — use saved location, go straight to auth
        selectLocation(savedLoc);
      } else {
        // First visit — show location picker
        loadingOverlay.classList.add('hidden');
        locationOverlay.classList.remove('hidden');
      }

      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/tech/service-worker.js').then((registration) => {
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                if (confirm('A new version is available. Reload to update?')) {
                  window.location.reload();
                }
              }
            });
          });
        }).catch(console.error);
      }
    });
  </script>
</body>
</html>
